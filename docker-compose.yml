version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: technorent
      POSTGRES_USER: technorent
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      DATABASE_URL: postgresql://technorent:${DB_PASSWORD}@db:5432/technorent
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3001}
      SITE_URL: ${SITE_URL:-https://technorent.ua}
      NODE_ENV: production
      PORT: 3001
    depends_on:
      - db

volumes:
  pgdata:
