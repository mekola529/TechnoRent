version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: technorent
      POSTGRES_USER: technorent
      POSTGRES_PASSWORD: ${DB_PASSWORD:-technorent_secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      DATABASE_URL: postgresql://technorent:${DB_PASSWORD:-technorent_secret}@db:5432/technorent
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-password}
      NODE_ENV: production
      PORT: 3001
    depends_on:
      - db

volumes:
  pgdata:
